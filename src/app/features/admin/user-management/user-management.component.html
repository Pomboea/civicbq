<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Gestión de Usuarios</h4>
      <small class="text-muted">{{ users.length }} usuarios registrados</small>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Usuario</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td><strong>{{ user.username }}</strong></td>
              <td>{{ user.nombre }}</td>
              <td>{{ user.email }}</td>
              <td>
                <span class="badge {{getRoleBadgeClass(user.role)}}">{{ user.role }}</span>
              </td>
              <td>
                <span class="badge" [class.bg-success]="user.activo" [class.bg-danger]="!user.activo">
                  {{ user.activo ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td>
                <div class="btn-group btn-group-sm">
                  <button class="btn btn-outline-secondary" (click)="toggleActive(user)"
                    [title]="user.activo ? 'Desactivar' : 'Activar'">
                    <i class="bi" [class.bi-pause-circle]="user.activo" [class.bi-play-circle]="!user.activo"></i>
                  </button>
                  <button class="btn btn-outline-warning" (click)="resetPassword(user)" title="Restablecer contraseña">
                    <i class="bi bi-key"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
